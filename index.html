<!DOCTYPE html>

<html>

<head>

    <title>
        Disaster Relief Hub Coordinator
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Disaster Relief Hub Coordinator
        </h1>

        <form id="emergencyForm">

            <textarea
                id="message"
                placeholder="Describe the disaster emergency..."
                required
            ></textarea>

            <div class="button-group">

                <button
                    type="submit"
                    class="analyze-btn"
                >
                    Analyze Emergency
                </button>

                <button
                    type="button"
                    id="restockBtn"
                >
                    Restock Warehouse
                </button>

            </div>

        </form>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
